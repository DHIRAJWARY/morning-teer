<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Common Numbers - Shillong Teer</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4f7f6; font-family: sans-serif; text-align: center;">

    <header style="background-color: #e67e22; padding: 15px; color: white;">
        <h1>🎯 Common Numbers</h1>
        <p id="res-date">--/--/----</p>
    </header>

    <div style="padding: 20px; max-width: 500px; margin: auto;">
        
        <div style="background: white; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="color: #2c3e50; border-bottom: 2px solid #e67e22; padding-bottom: 5px;">First Round</h2>
            <div style="display: flex; justify-content: space-around; font-size: 18px; margin-top: 10px;">
                <div><small>House</small><br><strong id="fr-house">--</strong></div>
                <div><small>Ending</small><br><strong id="fr-ending">--</strong></div>
            </div>
            <div style="margin-top: 15px; background: #fff3e0; padding: 10px; border-radius: 5px;">
                <small>Direct Common Number</small><br>
                <strong id="fr-common" style="font-size: 24px; color: #e67e22;">--</strong>
            </div>
        </div>

        <div style="background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 5px;">Second Round</h2>
            <div style="display: flex; justify-content: space-around; font-size: 18px; margin-top: 10px;">
                <div><small>House</small><br><strong id="sr-house">--</strong></div>
                <div><small>Ending</small><br><strong id="sr-ending">--</strong></div>
            </div>
            <div style="margin-top: 15px; background: #e8f4fd; padding: 10px; border-radius: 5px;">
                <small>Direct Common Number</small><br>
                <strong id="sr-common" style="font-size: 24px; color: #2980b9;">--</strong>
            </div>
        </div>

        <button onclick="location.href='index.html'" style="margin-top: 20px; padding: 10px 20px; border: none; background: #34495e; color: white; border-radius: 5px; cursor: pointer;">
            Go Back Home
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
