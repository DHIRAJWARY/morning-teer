<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Common Numbers - Shillong Morning Teer</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>🎯 Common Numbers</h1>
    </header>

    <div class="main-container">
        <section class="results-section">
            <div id="res-date" class="date-display">--/--/----</div>

            <table class="result-table" style="margin-bottom: 20px;">
                <thead>
                    <tr style="background: #34495e; color: white;">
                        <th colspan="2">SHILLONG MORNING (F/R)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="round-names">
                        <td>HOUSE</td>
                        <td>ENDING</td>
                    </tr>
                    <tr class="round-numbers" style="font-size: 32px;">
                        <td id="fr-house">--</td>
                        <td id="fr-ending">--</td>
                    </tr>
                    <tr style="background: #fdf2e9; border-top: 2px solid #eee;">
                        <td colspan="2" style="padding: 15px;">
                            <div style="font-size: 11px; font-weight: bold; color: #d35400; text-transform: uppercase;">Direct Common Number</div>
                            <div id="fr-common" style="font-size: 36px; font-weight: 900; color: #ff7f50;">--</div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <table class="result-table">
                <thead>
                    <tr style="background: #34495e; color: white;">
                        <th colspan="2">SHILLONG MORNING (S/R)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="round-names">
                        <td>HOUSE</td>
                        <td>ENDING</td>
                    </tr>
                    <tr class="round-numbers" style="font-size: 32px;">
                        <td id="sr-house">--</td>
                        <td id="sr-ending">--</td>
                    </tr>
                    <tr style="background: #ebf5fb; border-top: 2px solid #eee;">
                        <td colspan="2" style="padding: 15px;">
                            <div style="font-size: 11px; font-weight: bold; color: #2980b9; text-transform: uppercase;">Direct Common Number</div>
                            <div id="sr-common" style="font-size: 36px; font-weight: 900; color: #34495e;">--</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div style="padding: 10px;">
            <button onclick="location.href='index.html'" style="width: 100%; background: #2c3e50; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase;">
                ⬅ Back to Live Results
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
